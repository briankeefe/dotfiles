symbolPreset: nerd
theme:
  dark: titanium
setupVersion: 1
modelRoles:
  default: openai-codex/gpt-5.5
  smol: anthropic/claude-haiku-4-5:minimal
colorBlindMode: true
tui:
  textSizing: true
  hyperlinks: always
statusLine:
  separator: none
  sessionAccent: true
  showHookStatus: false
memory:
  backend: mnemopi
mnemopi:
  scoping: per-project-tagged
  llmMode: smol
  autoRecall: true
  autoRetain: true
startup:
  quiet: false