# Linux mirror of the macOS AeroSpace setup.
# Mental model: one app per workspace, fast app summon/banish, WS5 as junk drawer.

monitor=,preferred,auto,auto

$terminal = ghostty
$menu = wofi --show drun
$wmMod = CTRL SUPER
$wsMod = ALT

# Electron apps should prefer Wayland when they support it.
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

input {
  kb_layout = us
  follow_mouse = 1

  touchpad {
    natural_scroll = no
  }

  sensitivity = 0
}

general {
  gaps_in = 8
  gaps_out = 8
  border_size = 2
  col.active_border = rgba(00ffffff)
  col.inactive_border = rgba(2a3340aa)
  layout = dwindle
  allow_tearing = false
}

decoration {
  rounding = 8

  blur {
    enabled = false
  }
}

animations {
  enabled = yes
  bezier = easeOut, 0.05, 0.9, 0.1, 1.0
  animation = windows, 1, 5, easeOut
  animation = windowsOut, 1, 4, default, popin 80%
  animation = border, 1, 8, default
  animation = fade, 1, 4, default
  animation = workspaces, 1, 5, easeOut
}

dwindle {
  pseudotile = yes
  preserve_split = yes
}

misc {
  force_default_wallpaper = -1
  disable_hyprland_logo = true
}

# App homes. Confirm class names on a new Linux machine with: hyprctl clients
# 1 Ghostty · 2 Slack · 3 DataGrip · 4 Chrome · 5 junk drawer
windowrulev2 = workspace 1 silent,class:^(com\.mitchellh\.ghostty|ghostty|Ghostty)$
windowrulev2 = workspace 2 silent,class:^(Slack|slack)$
windowrulev2 = workspace 3 silent,class:^(jetbrains-datagrip|DataGrip|datagrip)$
windowrulev2 = workspace 4 silent,class:^(google-chrome|Google-chrome|chromium|Chromium)$

# Launchers.
bind = $wmMod, Return, exec, $terminal
bind = $wmMod, Space, exec, $menu

# Window manager ownership lives on ctrl-super so alt stays free for workspace muscle memory.
bind = $wmMod, H, movefocus, l
bind = $wmMod, J, movefocus, d
bind = $wmMod, K, movefocus, u
bind = $wmMod, L, movefocus, r
bind = $wmMod SHIFT, H, movewindow, l
bind = $wmMod SHIFT, J, movewindow, d
bind = $wmMod SHIFT, K, movewindow, u
bind = $wmMod SHIFT, L, movewindow, r
bind = $wmMod, M, fullscreen
bind = $wsMod SHIFT, Space, togglefloating

# Whole-workspace float / re-tile, matching the AeroSpace temporary free-drag mode.
bind = $wmMod SHIFT, F, exec, ~/.config/hypr/scripts/workspace-floating float
bind = $wmMod SHIFT, T, exec, ~/.config/hypr/scripts/workspace-floating tile

# Workspaces: Ghostty=1, Slack=2, DataGrip=3, Chrome=4, junk=5.
bind = $wsMod, 1, workspace, 1
bind = $wsMod, 2, workspace, 2
bind = $wsMod, 3, workspace, 3
bind = $wsMod, 4, workspace, 4
bind = $wsMod, 5, workspace, 5
bind = $wsMod SHIFT, 1, movetoworkspacesilent, 1
bind = $wsMod SHIFT, 2, movetoworkspacesilent, 2
bind = $wsMod SHIFT, 3, movetoworkspacesilent, 3
bind = $wsMod SHIFT, 4, movetoworkspacesilent, 4
bind = $wsMod SHIFT, 5, movetoworkspacesilent, 5

# Summon TOGGLE: pull app to current workspace, or banish it home if already here.
bind = $wmMod, G, exec, ~/.config/hypr/scripts/summon-app "^(com\.mitchellh\.ghostty|ghostty|Ghostty)$" 1
bind = $wmMod, S, exec, ~/.config/hypr/scripts/summon-app "^(Slack|slack)$" 2
bind = $wmMod, D, exec, ~/.config/hypr/scripts/summon-app "^(jetbrains-datagrip|DataGrip|datagrip)$" 3
bind = $wmMod, C, exec, ~/.config/hypr/scripts/summon-app "^(google-chrome|Google-chrome|chromium|Chromium)$" 4

# Panic button: apps home, stray windows from WS1-4 to WS5.
bind = $wmMod, R, exec, ~/.config/hypr/scripts/reset-apps-home

# Utility controls.
bind = $wmMod, Q, killactive
bind = $wmMod SHIFT, X, exec, hyprlock
bind = $wmMod SHIFT, B, exec, sh -c 'killall waybar 2>/dev/null; waybar &'
bind = $wmMod, Print, exec, grim - | wl-copy
bind = $wmMod SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

# Move/resize windows with ctrl-super + mouse.
bindm = $wmMod, mouse:272, movewindow
bindm = $wmMod, mouse:273, resizewindow
