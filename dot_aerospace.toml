config-version = 2

# JankyBorders runs as a launchd service (`brew services start borders`), config
# in ~/.config/borders/bordersrc. Not launched here so there's a single source of
# truth and the border survives AeroSpace reloads/restarts.

start-at-login = true
enable-normalization-flatten-containers = true
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# One app per workspace: Ghostty=1, Slack=2, DataGrip=3, Chrome=4, WS5=junk drawer.
# All five persist so switch/banish/summon targets always exist.
persistent-workspaces = ["1", "2", "3", "4", "5"]

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

[mode.main.binding]
# Window nav on cmd-ctrl so it never collides with terminal/herdr/vim (which own bare alt-hjkl)
cmd-ctrl-h = 'focus left'
cmd-ctrl-j = 'focus down'
cmd-ctrl-k = 'focus up'
cmd-ctrl-l = 'focus right'
cmd-ctrl-shift-h = 'move left'
cmd-ctrl-shift-j = 'move down'
cmd-ctrl-shift-k = 'move up'
cmd-ctrl-shift-l = 'move right'
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-slash = 'layout tiles horizontal'
alt-comma = 'layout accordion horizontal'
cmd-ctrl-m = 'fullscreen'
alt-shift-space = 'layout floating tiling'

# Summon TOGGLE: if the app is NOT on the current workspace, pull it here + focus it.
# If it IS already here, banish it back to its home workspace. Same key both ways.
# Homes: Ghostty=1, Chrome=4, Slack=2, DataGrip=3. No-op if the app has no window.
cmd-ctrl-g = 'exec-and-forget wl=$(aerospace list-windows --monitor all --app-bundle-id com.mitchellh.ghostty --format "%{window-id} %{workspace}" | head -n1); wid=${wl%% *}; ws=${wl##* }; cur=$(aerospace list-workspaces --focused); [ -z "$wid" ] || { if [ "$ws" = "$cur" ]; then aerospace move-node-to-workspace --window-id "$wid" 1; else aerospace move-node-to-workspace --window-id "$wid" --focus-follows-window "$cur"; fi; }'
cmd-ctrl-c = 'exec-and-forget wl=$(aerospace list-windows --monitor all --app-bundle-id com.google.Chrome --format "%{window-id} %{workspace}" | head -n1); wid=${wl%% *}; ws=${wl##* }; cur=$(aerospace list-workspaces --focused); [ -z "$wid" ] || { if [ "$ws" = "$cur" ]; then aerospace move-node-to-workspace --window-id "$wid" 4; else aerospace move-node-to-workspace --window-id "$wid" --focus-follows-window "$cur"; fi; }'
cmd-ctrl-s = 'exec-and-forget wl=$(aerospace list-windows --monitor all --app-bundle-id com.tinyspeck.slackmacgap --format "%{window-id} %{workspace}" | head -n1); wid=${wl%% *}; ws=${wl##* }; cur=$(aerospace list-workspaces --focused); [ -z "$wid" ] || { if [ "$ws" = "$cur" ]; then aerospace move-node-to-workspace --window-id "$wid" 2; else aerospace move-node-to-workspace --window-id "$wid" --focus-follows-window "$cur"; fi; }'
cmd-ctrl-d = 'exec-and-forget wl=$(aerospace list-windows --monitor all --app-bundle-id com.jetbrains.datagrip --format "%{window-id} %{workspace}" | head -n1); wid=${wl%% *}; ws=${wl##* }; cur=$(aerospace list-workspaces --focused); [ -z "$wid" ] || { if [ "$ws" = "$cur" ]; then aerospace move-node-to-workspace --window-id "$wid" 3; else aerospace move-node-to-workspace --window-id "$wid" --focus-follows-window "$cur"; fi; }'

# Whole-desktop float / re-tile (temporary free-drag mode for the current workspace)
cmd-ctrl-shift-f = 'exec-and-forget for wid in $(aerospace list-windows --workspace $(aerospace list-workspaces --focused) --format "%{window-id}"); do aerospace layout floating --window-id "$wid"; done'
cmd-ctrl-shift-t = 'exec-and-forget for wid in $(aerospace list-windows --workspace $(aerospace list-workspaces --focused) --format "%{window-id}"); do aerospace layout tiling --window-id "$wid"; done'

# Hard reset: send every window of each app to its home workspace (Ghostty=1, Slack=2,
# DataGrip=3, Chrome=4), then sweep any stray/unknown window off WS1-4 into WS5 (junk).
cmd-ctrl-r = 'exec-and-forget for pair in "com.mitchellh.ghostty 1" "com.tinyspeck.slackmacgap 2" "com.jetbrains.datagrip 3" "com.google.Chrome 4"; do bid=${pair%% *}; home=${pair##* }; for w in $(aerospace list-windows --monitor all --app-bundle-id "$bid" --format "%{window-id}"); do aerospace move-node-to-workspace --window-id "$w" "$home"; done; done; for ws in 1 2 3 4; do case "$ws" in 1) owner=com.mitchellh.ghostty ;; 2) owner=com.tinyspeck.slackmacgap ;; 3) owner=com.jetbrains.datagrip ;; 4) owner=com.google.Chrome ;; esac; aerospace list-windows --workspace "$ws" --format "%{window-id}|%{app-bundle-id}" | while IFS="|" read -r w bid; do [ "$bid" = "$owner" ] || aerospace move-node-to-workspace --window-id "$w" 5; done; done'

[[on-window-detected]]
if = 'test %{app-bundle-id} = com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if = 'test %{app-bundle-id} = com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if = 'test %{app-bundle-id} = com.jetbrains.datagrip'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if = 'test %{app-bundle-id} = com.google.Chrome'
run = 'move-node-to-workspace 4'
